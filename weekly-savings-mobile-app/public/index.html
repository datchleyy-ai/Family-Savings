<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Family Savings" />
  <title>Weekly Savings</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="/styles.css?v=8" />
</head>
<body>
  <section id="pinScreen" class="pin-screen">
    <form id="pinForm" class="pin-card">
      <p class="eyebrow">MONTH OF JULY</p>
      <h1>FAMILY SAVINGS TRACKER</h1>
      <label>
        Family PIN
        <input id="pinInput" type="password" inputmode="numeric" autocomplete="current-password" maxlength="12" />
      </label>
      <button class="primary-button" type="submit">Unlock app</button>
    </form>
  </section>

  <main id="appShell" class="app-shell" hidden>
    <header class="topbar">
      <div class="top-actions">
        <div class="view-tabs" aria-label="App sections">
          <button id="savingsTab" class="tab-button active" type="button">Savings</button>
          <button id="billsTab" class="tab-button" type="button">Bills</button>
          <button id="noticesTab" class="tab-button" type="button">Notices</button>
        </div>
        <button id="refreshButton" class="icon-button" aria-label="Refresh totals">↻</button>
      </div>
      <div>
        <p class="eyebrow">MONTH OF JULY</p>
        <h1>FAMILY SAVINGS TRACKER</h1>
      </div>
    </header>

    <section id="savingsScreen" class="screen active" aria-label="Savings tracker">
      <section class="summary-grid" aria-label="Savings summary">
        <article class="summary-card">
          <span>Dennis</span>
          <strong id="youSaved">$0</strong>
          <small id="youProgress">$0 left</small>
          <div class="meter"><i id="youMeter"></i></div>
        </article>
        <article class="summary-card">
          <span>Havin</span>
          <strong id="wifeSaved">$0</strong>
          <small id="wifeProgress">$0 left</small>
          <div class="meter"><i id="wifeMeter"></i></div>
        </article>
        <article class="summary-card full">
          <span>Combined</span>
          <strong id="combinedSaved">$0</strong>
          <small id="combinedProgress">$0 left</small>
          <div class="meter"><i id="combinedMeter"></i></div>
        </article>
      </section>

      <section class="panel compact-panel">
        <div class="section-title">
          <h2>Monthly targets</h2>
          <button id="saveTargets" class="secondary-button">Save targets</button>
        </div>
        <form id="targetForm" class="target-form">
          <label> Dennis target <input id="youTarget" name="youTarget" inputmode="decimal" type="number" min="0" step="0.01" /></label>
          <label> Havin target <input id="wifeTarget" name="wifeTarget" inputmode="decimal" type="number" min="0" step="0.01" /></label>
        </form>
      </section>

      <section class="week-list" id="weekList" aria-live="polite"></section>
    </section>

    <section id="billsScreen" class="screen" aria-label="Bills list" hidden>
      <section class="panel bills-summary">
        <div class="section-title">
          <h2>Monthly bills</h2>
          <strong id="billsTotal">$0</strong>
        </div>
      </section>
      <section class="category-list" id="categoryList" aria-live="polite"></section>
    </section>

    <section id="noticesScreen" class="screen" aria-label="Notices" hidden>
      <section class="panel notice-composer">
        <div class="section-title">
          <h2>Notices</h2>
        </div>
        <form id="noticeForm" class="notice-form">
          <label>
            Post a notice
            <textarea id="noticeText" name="noticeText" rows="4" maxlength="500" placeholder="Type a note for the family..."></textarea>
          </label>
          <button class="primary-button" type="submit">Post notice</button>
        </form>
      </section>
      <section class="notice-list" id="noticeList" aria-live="polite"></section>
    </section>
  </main>

  <nav class="bottom-actions" id="bottomActions">
    <button id="resetButton" class="ghost-button">Reset month</button>
    <button id="installButton" class="primary-button" hidden>Install app</button>
  </nav>

  <template id="weekTemplate">
    <article class="week-card">
      <div class="week-head">
        <h2></h2>
        <span class="week-total"></span>
      </div>
      <form class="entry-form">
        <label>
          Dennis savings
          <input name="youAmount" inputmode="decimal" type="number" min="0" step="0.01" />
        </label>
        <label class="check-row">
          <input name="youDone" type="checkbox" />
          <span>Dennis completed</span>
        </label>
        <label>
          Havin savings
          <input name="wifeAmount" inputmode="decimal" type="number" min="0" step="0.01" />
        </label>
        <label class="check-row">
          <input name="wifeDone" type="checkbox" />
          <span>Havin completed</span>
        </label>
        <section class="payroll-section" aria-label="Previous week payroll">
          <h3>Previous week payroll</h3>
          <label>
            Dennis paycheck
            <input name="youPaycheck" inputmode="decimal" type="number" min="0" step="0.01" />
          </label>
          <label>
            Dennis put into savings
            <input name="youPutBack" inputmode="decimal" type="number" min="0" step="0.01" />
          </label>
          <label>
            Havin paycheck
            <input name="wifePaycheck" inputmode="decimal" type="number" min="0" step="0.01" />
          </label>
          <label>
            Havin put into savings
            <input name="wifePutBack" inputmode="decimal" type="number" min="0" step="0.01" />
          </label>
        </section>
        <label class="note-field">
          Note
          <textarea name="note" rows="2" maxlength="240"></textarea>
        </label>
        <button class="primary-button" type="submit">Submit week</button>
      </form>
    </article>
  </template>

  <template id="categoryTemplate">
    <article class="category-card">
      <div class="category-head">
        <h2></h2>
        <strong></strong>
      </div>
      <div class="bill-list"></div>
    </article>
  </template>

  <template id="billTemplate">
    <div class="bill-row">
      <label class="paid-check">
        <input type="checkbox" />
        <span>Paid</span>
      </label>
      <div class="bill-main">
        <span class="bill-name"></span>
        <small class="bill-due"></small>
        <small class="bill-countdown"></small>
      </div>
      <strong></strong>
    </div>
  </template>

  <template id="noticeTemplate">
    <article class="notice-card">
      <strong></strong>
      <p></p>
    </article>
  </template>

  <div id="toast" role="status" aria-live="polite"></div>
  <script src="/app.js?v=8" type="module"></script>
</body>
</html>
